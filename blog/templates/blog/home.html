{% extends 'blog/base.html' %}

{% block content %}
<h2 class="mb-4">Latest Stock Tips</h2>

{% for post in posts %}
<div class="card mb-3 shadow-sm">
    <div class="card-body">
        <h4>{{ post.title }}</h4>
        <p><strong>Stock:</strong> {{ post.stock_name }}</p>
        <p>{{ post.content|truncatewords:25 }}</p>
        <a href="/post/{{ post.id }}/" class="btn btn-primary">Read More</a>
    </div>
</div>
{% empty %}
<p>No posts yet.</p>
{% endfor %}

{% endblock %}
